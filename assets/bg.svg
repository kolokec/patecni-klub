<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
  <!-- Páteční klub – noční město v dešti (originální ilustrace, volně nahraditelná) -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="0.55" stop-color="#0a0e1c"/>
      <stop offset="0.78" stop-color="#101731"/>
      <stop offset="1" stop-color="#141b3a"/>
    </linearGradient>
    <linearGradient id="street" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131a36"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="reflAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb066" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffb066" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fd3e0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4fd3e0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflMagenta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5f96" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ff5f96" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowAmber" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb066" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffb066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4fd3e0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4fd3e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softer" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- obloha -->
  <rect width="1600" height="620" fill="url(#sky)"/>

  <!-- záře města nad obzorem -->
  <ellipse cx="420" cy="600" rx="520" ry="180" fill="url(#glowAmber)" filter="url(#softer)" opacity="0.5"/>
  <ellipse cx="1220" cy="590" rx="480" ry="160" fill="url(#glowCyan)" filter="url(#softer)" opacity="0.5"/>

  <!-- vzdálené mrakodrapy -->
  <g fill="#0b0f20">
    <rect x="40"  y="360" width="90"  height="260"/>
    <rect x="150" y="300" width="70"  height="320"/>
    <rect x="240" y="400" width="110" height="220"/>
    <rect x="370" y="260" width="80"  height="360"/>
    <rect x="470" y="380" width="95"  height="240"/>
    <rect x="590" y="330" width="65"  height="290"/>
    <rect x="680" y="420" width="120" height="200"/>
    <rect x="830" y="290" width="85"  height="330"/>
    <rect x="940" y="370" width="100" height="250"/>
    <rect x="1070" y="250" width="75" height="370"/>
    <rect x="1170" y="390" width="110" height="230"/>
    <rect x="1310" y="320" width="80"  height="300"/>
    <rect x="1420" y="410" width="130" height="210"/>
    <polygon points="370,260 410,215 450,260"/>
    <polygon points="1070,250 1107,200 1145,250"/>
  </g>

  <!-- okna vzdálených budov -->
  <g opacity="0.8">
    <g fill="#ffb066">
      <rect x="62" y="385" width="7" height="10"/><rect x="88" y="415" width="7" height="10"/>
      <rect x="167" y="330" width="7" height="10"/><rect x="190" y="380" width="7" height="10"/>
      <rect x="395" y="300" width="7" height="10"/><rect x="420" y="350" width="7" height="10"/>
      <rect x="395" y="430" width="7" height="10"/><rect x="612" y="365" width="7" height="10"/>
      <rect x="855" y="330" width="7" height="10"/><rect x="880" y="400" width="7" height="10"/>
      <rect x="1090" y="290" width="7" height="10"/><rect x="1115" y="350" width="7" height="10"/>
      <rect x="1335" y="360" width="7" height="10"/><rect x="1450" y="440" width="7" height="10"/>
    </g>
    <g fill="#4fd3e0">
      <rect x="265" y="430" width="7" height="10"/><rect x="300" y="470" width="7" height="10"/>
      <rect x="495" y="410" width="7" height="10"/><rect x="520" y="460" width="7" height="10"/>
      <rect x="705" y="450" width="7" height="10"/><rect x="755" y="490" width="7" height="10"/>
      <rect x="965" y="400" width="7" height="10"/><rect x="990" y="460" width="7" height="10"/>
      <rect x="1195" y="420" width="7" height="10"/><rect x="1240" y="480" width="7" height="10"/>
      <rect x="1490" y="450" width="7" height="10"/><rect x="1120" y="420" width="7" height="10"/>
    </g>
    <g fill="#ff5f96">
      <rect x="440" y="320" width="7" height="10"/><rect x="640" y="420" width="7" height="10"/>
      <rect x="912" y="360" width="7" height="10"/><rect x="1355" y="420" width="7" height="10"/>
    </g>
  </g>

  <!-- neonové vývěsky -->
  <g filter="url(#soft)">
    <rect x="330" y="520" width="60" height="14" rx="3" fill="#ffb066" opacity="0.85"/>
    <rect x="720" y="540" width="46" height="12" rx="3" fill="#ff5f96" opacity="0.8"/>
    <rect x="1150" y="525" width="70" height="13" rx="3" fill="#4fd3e0" opacity="0.85"/>
  </g>

  <!-- mokrá ulice -->
  <rect y="620" width="1600" height="280" fill="url(#street)"/>
  <rect y="616" width="1600" height="6" fill="#1c2448" opacity="0.9"/>

  <!-- odlesky světel na mokré vozovce -->
  <g filter="url(#soft)">
    <rect x="345" y="622" width="34" height="230" fill="url(#reflAmber)"/>
    <rect x="736" y="622" width="26" height="190" fill="url(#reflMagenta)"/>
    <rect x="1168" y="622" width="40" height="250" fill="url(#reflCyan)"/>
    <rect x="80"  y="622" width="18" height="160" fill="url(#reflAmber)" opacity="0.6"/>
    <rect x="520" y="622" width="16" height="140" fill="url(#reflCyan)" opacity="0.55"/>
    <rect x="905" y="622" width="20" height="170" fill="url(#reflAmber)" opacity="0.6"/>
    <rect x="1340" y="622" width="16" height="150" fill="url(#reflMagenta)" opacity="0.5"/>
    <rect x="1480" y="622" width="22" height="180" fill="url(#reflCyan)" opacity="0.5"/>
  </g>

  <!-- světla projíždějících aut -->
  <g filter="url(#softer)">
    <ellipse cx="620" cy="640" rx="60" ry="10" fill="#ffb066" opacity="0.5"/>
    <ellipse cx="1035" cy="648" rx="46" ry="8" fill="#ff5f96" opacity="0.4"/>
  </g>

  <!-- jemné zvlnění hladiny louží -->
  <g stroke="#e8ecf6" stroke-opacity="0.05" stroke-width="2">
    <line x1="120" y1="700" x2="330" y2="700"/>
    <line x1="480" y1="760" x2="700" y2="760"/>
    <line x1="850" y1="720" x2="1080" y2="720"/>
    <line x1="1230" y1="780" x2="1460" y2="780"/>
  </g>
</svg>
